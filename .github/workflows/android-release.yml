name: Android Release (Custom Build)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        default: 'v1.0.0-custom'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取指定代码 (使用了你提供的 Commit ID)
      - name: Checkout repository
        uses: actions/checkout@v4
        with: 
          repository: CherryHQ/cherry-studio-app
          ref: 45306bcb868f56f1159152fe7feda8404ef1cead

      # 2. 设置环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 4. Expo 预构建 (生成 android 目录)
      - name: Expo Prebuild
        run: npx expo prebuild --platform android

      # 5. 使用 Gradle 编译 APK
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # 6. 将 APK 移动到根目录并重命名 (方便识别)
      - name: Prepare APK for Upload
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk ./CherryStudio-Fixed.apk

      # 7. 上传到 GitHub Actions Artifacts (最稳妥的获取方式)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cherry-Studio-Fixed-APK
          path: CherryStudio-Fixed.apk

      # 8. 创建 GitHub Release (可选，如果你想在 Release 页面看到它)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Cherry Studio Custom Fix
          files: CherryStudio-Fixed.apk
          draft: true  # 先设为草稿，你可以手动发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
